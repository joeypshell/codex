name: Verify

on:
  push:
  pull_request:

jobs:
  detect:
    name: Detect project shape
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
      has_compose: ${{ steps.detect.outputs.has_compose }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect files
        id: detect
        shell: bash
        run: |
          echo "has_go=$([ -f go.mod ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_node=$([ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ] || [ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_python=$([ -f pyproject.toml ] || [ -f requirements.txt ] || [ -d tests ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_rust=$([ -f Cargo.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_dotnet=$(find . -maxdepth 3 \( -name '*.sln' -o -name '*.csproj' \) -print -quit | grep -q . && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_compose=$([ -f docker-compose.yml ] || [ -f compose.yml ] || [ -f deploy/docker-compose.yml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  go-test:
    name: Go tests
    needs: detect
    if: needs.detect.outputs.has_go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  node-verify:
    name: Node verification
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Run tests when configured
        shell: bash
        run: |
          if npm run | grep -qE '^  test$|^    test$'; then
            npm test
          else
            echo "No npm test script configured."
          fi

      - name: Build when configured
        shell: bash
        run: |
          if npm run | grep -qE '^  build$|^    build$'; then
            npm run build
          else
            echo "No npm build script configured."
          fi

  python-test:
    name: Python tests
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest

      - name: Run pytest when tests exist
        shell: bash
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "No tests directory found."
          fi

  rust-test:
    name: Rust tests
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run cargo tests
        run: cargo test

  dotnet-test:
    name: .NET tests
    needs: detect
    if: needs.detect.outputs.has_dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4

      - name: Run .NET tests
        run: dotnet test

  compose-config:
    name: Docker Compose config
    needs: detect
    if: needs.detect.outputs.has_compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose config
        shell: bash
        run: |
          if [ -f deploy/docker-compose.yml ]; then
            docker compose -f deploy/docker-compose.yml config
          elif [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config
          else
            docker compose -f compose.yml config
          fi
