name: Verify

on:
  push:
  pull_request:

env:
  GODOT_RELEASE: "4.7-stable"
  GODOT_LINUX_ZIP: "Godot_v4.7-stable_linux.x86_64.zip"
  GODOT_LINUX_BIN: "Godot_v4.7-stable_linux.x86_64"

jobs:
  godot-scene-load:
    name: Godot scene load
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -L \
            -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${GODOT_LINUX_ZIP}"
          unzip -q godot.zip -d godot
          chmod +x "godot/${GODOT_LINUX_BIN}"

      - name: Load main scene
        run: |
          "godot/${GODOT_LINUX_BIN}" \
            --headless \
            --path . \
            --scene res://scenes/Main.tscn \
            --quit-after 5
