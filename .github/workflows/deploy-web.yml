name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_RELEASE: "4.7-stable"
  GODOT_TEMPLATE_DIR: "4.7.stable"
  GODOT_LINUX_ZIP: "Godot_v4.7-stable_linux.x86_64.zip"
  GODOT_LINUX_BIN: "Godot_v4.7-stable_linux.x86_64"
  GODOT_TEMPLATES: "Godot_v4.7-stable_export_templates.tpz"

jobs:
  export:
    name: Export Godot web build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -L \
            -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${GODOT_LINUX_ZIP}"
          unzip -q godot.zip -d godot
          chmod +x "godot/${GODOT_LINUX_BIN}"

      - name: Install export templates
        run: |
          curl -L \
            -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${GODOT_TEMPLATES}"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          unzip -q templates.tpz -d templates
          cp templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}/"

      - name: Export web build
        run: |
          mkdir -p build/web
          "godot/${GODOT_LINUX_BIN}" \
            --headless \
            --path . \
            --export-release Web \
            build/web/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Publish to GitHub Pages
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
